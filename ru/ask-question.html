<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LM7CCJ5HKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LM7CCJ5HKX');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задать вопрос | Bible for All</title>

  <!-- ✅ SEO Meta Tags -->
  <meta name="description" content="Задайте вопрос о Библии, вере или жизни. Bible for All стремится отвечать на вопросы на основании Священного Писания.">
  <meta name="keywords" content="Библия, отзывы, комментарии, Писание, стихи, христианство, русская Библия, английская Библия">
  <meta name="author" content="Lana Vayner">

  <!-- Favicon -->
  <link rel="icon" href="/images/favicon.png" type="image/png" sizes="32x32" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/images/favicon.png" sizes="192x192" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />
    
  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Bible for All" />
  <meta property="og:description" content="Задайте вопрос о Библии, вере или жизни." />
  <meta property="og:image" content="https://bibleforall.ca/og-image.png" />
  <meta property="og:url" content="https://bibleforall.ca/ru/ask-question.html" />
  <meta property="og:type" content="website" />
  <!-- Canonical -->
  <link rel="canonical" href="https://bibleforall.ca/ru/ask-question.html" />

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="container">
    <div id="header"></div>
    <main role="main"> 

      <header class="comments-hero">
        <!--<div class="comments-badge">💛 Bible for All</div>-->        
        <h1 class="comments-title">Задать вопрос</h1>
        <p class="comments-subtitle">
            Вы можете задать вопрос о Библии, вере или жизни. Мы стараемся отвечать на вопросы на основании Священного Писания.
        </p>
      </header>
      <section class="comments-form comments-form-modern">
        <div class="comments-card">
          <form name="bible-question" method="POST" data-netlify="true" honeypot="bot-field" onsubmit="showConfirmation(event)">
            <input type="hidden" name="form-name" value="bible-question">
      
            <p style="display:none">
              <label>Don’t fill this out: <input name="bot-field"></label>
            </p>
      
            <div class="form-group">
              <label for="name">Ваше имя</label>
              <input type="text" id="name" name="name" required>
            </div>
      
            <div class="form-group">
              <label for="email">Ваш Email <span class="optional-text">(необязательно)</span></label>
              <input type="email" id="email" name="email" placeholder="you@example.com">
              <small class="form-note">Мы не публикуем ваш email.</small>
            </div>
            
            <div class="form-group">
              <label for="message">Ваш вопрос</label>
              <textarea id="message" name="message" rows="5" required placeholder="Напишите ваш вопрос о Библии, вере или жизни..."></textarea>
            </div>
      
            <button type="submit" class="comments-submit-btn">Отправить вопрос</button>
          </form>
      
          <div id="confirmation" class="confirmation-message">
            <div class="confirmation-icon">✨</div>
            <div class="confirmation-title">Спасибо за ваш вопрос!</div>
            <div class="confirmation-text">
                Ваш вопрос успешно отправлен.
            </div>
          </div>
        </div>
      </section>

    </main> 
    <footer class="footer">
      © 2025 Bible for All. Все права защищены.
    </footer>
  </div>
  <script>
    function showConfirmation(event) {
      event.preventDefault();
      const form = event.target;

      fetch("/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams(new FormData(form)).toString()
      })
      .then(() => {
        form.style.display = "none";
        document.getElementById("confirmation").style.display = "block";
      })
      .catch((error) => alert("Submission failed. Please try again."));
    }
  </script>
  <script src="../js/header.js"  defer></script>
  <script src="../js/menu.js" defer></script>

</body>
</html>
